<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArkyType</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #10101a;
      color: #f5f5f5;
      font-family: Inter, system-ui, sans-serif;
    }
    #key-display {
      text-align: center;
    }
    .label {
      font-size: 1rem;
      opacity: 0.75;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    .value {
      font-size: 3rem;
      line-height: 1.2;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .letter {
      color: #8b95b9;
      transition: color 120ms ease;
      position: relative;
    }
    .letter.typed {
      color: #ffffff;
    }
    .cursor-target {
      position: relative;
    }
    .cursor-target::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 2px;
      height: 100%;
      background: #ffffff;
      animation: blink 1s step-start infinite;
    }
    .cursor-placeholder {
      display: inline-block;
      width: 0;
      height: 1.2em;
      position: relative;
    }
    @keyframes blink {
      0%, 50% {
        opacity: 1;
      }
      51%, 100% {
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="key-display">
    <div class="label">ArkyType</div>
    <div class="value" id="lastKey"></div>
    <div class="status" id="status" aria-live="polite" style="font-size:0.9rem;opacity:0.7;margin-top:0.5rem"></div>
  </div>
  <script type="module" src="./dist/index.js"></script>
</body>
</html>
